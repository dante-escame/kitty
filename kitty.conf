# vim:fileencoding=utf-9:foldmethod=marker

# BEGIN_KITTY_THEME
# Cyberpunk
include current-theme.conf
confirm_os_window_close 0
cursor_trail 1
cursor_shape beam
cursor_beam_thickness 0
cursor_stop_blinking_after 0
cursor_shape_unfocused unchanged
font_size 12.0
cursor_blink_interval 0.5
window_padding_width 25
font_family     Jetbrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
background_opacity 0.9
# END_KITTY_THEME

# IDE-like layout
enabled_layouts splits

kitty_mod ctrl+shift

# PANES
# New pane/split in the current tab
map kitty_mod+enter launch --cwd=current --location=hsplit
map kitty_mod+] launch --cwd=current --location=split
map kitty_mod+backspace close_window

# TABS
map kitty_mod+t new_tab
map kitty_mod+w close_tab

# Primary tab navigation
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab

# Reliable fallback navigation when ctrl+tab is intercepted
map kitty_mod+right next_tab
map kitty_mod+left previous_tab
map ctrl+page_down next_tab
map ctrl+page_up previous_tab

# Reorder tabs
map kitty_mod+. move_tab_forward
map kitty_mod+, move_tab_backward

# Direct tab access
map ctrl+alt+1 goto_tab 1
map ctrl+alt+2 goto_tab 2
map ctrl+alt+3 goto_tab 3
map ctrl+alt+4 goto_tab 4
map ctrl+alt+5 goto_tab 5
map ctrl+alt+6 goto_tab 6
map ctrl+alt+7 goto_tab 7
map ctrl+alt+8 goto_tab 8
map ctrl+alt+9 goto_tab 9

# Session Picker
map kitty_mod+d goto_session ~/.config/kitty/sessions
map kitty_mod+s save_as_session --use-foreground-process --base-dir ~/.config/kitty/sessions --match=state:parent_active
map kitty_mod+alt+s save_as_session --save-only --use-foreground-process --base-dir ~/.config/kitty/sessions --match=state:parent_active
map kitty_mod+alt+a save_as_session --use-foreground-process --base-dir ~/.config/kitty/sessions

# Copy with selection and Paste with right-click
copy_on_select yes
unmap right_click
mouse_map right click ungrabbed paste_from_clipboard

enable_audio_bell no
confirm_window_close 0

# Remote Control
allow_remote_control yes
listen_on unix:/tmp/kitty
shell_integration no_sudo

# Cursor trail
cursor_trail 1
cursor_trail_decay 0.1 0.4
